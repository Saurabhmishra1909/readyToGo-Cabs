name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-m2-${{ hashFiles('readyToGo/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2-
    
    - name: Build with Maven
      run: mvn -f readyToGo/pom.xml clean package
      
    - name: Run Tests
      run: mvn -f readyToGo/pom.xml test
      
    - name: Verify test reports directory
      run: |
        echo "Checking test reports path..."
        ls -la readyToGo/target/surefire-reports/ || echo "No test reports found"
      
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: readyToGo/target/surefire-reports
        if-no-files-found: ignore
    
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
